<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bai 2</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="card">
      <div class="layer skeleton-layer">
        <div class="skeleton-img skeleton-anim"></div>
        <div class="card-body">
          <div class="skeleton-title skeleton-anim"></div>
          <div class="skeleton-text skeleton-anim"></div>
          <div class="skeleton-text skeleton-anim"></div>
          <div class="skeleton-text skeleton-anim short"></div>
        </div>
      </div>

      <div class="layer content-layer">
        <img
          src="./tree.jpg"
          alt="Plant"
          class="content-img"
        />
        <div class="card-body">
          <h3 class="content-title">Quang Cảnh</h3>
          <p class="content-desc">
            Cây cảnh nhiệt đới dễ chăm, lá lớn đặc trưng, hợp không gian trong
            nhà.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
