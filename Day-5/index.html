<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Amaya Roasting Co.</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="main-header">
      <div class="container">
        <div class="nav nav-left">
          <a href="#" class="nav-item active">Home</a>
          <a href="#" class="nav-item">Pages</a>
          <a href="#" class="nav-item">Articles</a>
        </div>

        <div class="logo">
          <a href="#" class="logo-img">
            <img src="./img/logo.svg" alt="Logo" />
          </a>
        </div>

        <div class="nav nav-right">
          <a href="#" class="nav-item">Contact</a>
          <a href="#" class="nav-item">Shop</a>
          <a href="#" class="nav-item">Locations</a>
        </div>
      </div>
    </header>
    <section class="hero-section">
      <div class="container">
        <div class="hero-banner">
          <img src="./img/banner-coffee.png" alt="Amaya Roasting Co. Banner" />
        </div>
      </div>
    </section>
    <section class="about-section">
      <div class="container">
        <div class="about-heading">
          <span class="sub-title">BECAUSE WE LOVE COFFEE</span>
          <h1 class="main-title">About Us</h1>
        </div>

        <div class="about-row">
          <div class="about-col">
            <div class="text-content">
              <span class="col-sub">HOME DELIVERY</span>
              <h2>Quality coffee delivered to your door</h2>
            </div>
            <div class="img-content">
              <img src="./img/about-1.png" alt="about-1" />
            </div>
          </div>

          <div class="about-col reverse">
            <div class="text-content">
              <span class="col-sub">OUR MISSION</span>
              <h2>It all began with a modest concept: Create amazing coffee</h2>
            </div>
            <div class="img-content">
              <img src="./img/about-2.png" alt="about-2" />
            </div>
          </div>

          <div class="about-col">
            <div class="text-content">
              <span class="col-sub">TIME TO CHILL</span>
              <h2>Black Coffee Shaved Ice</h2>
            </div>
            <div class="img-content">
              <img src="./img/about-3.png" alt="about-3" />
            </div>
          </div>
        </div>
      </div>
    </section>
    <section class="bottom-banner-section">
      <div class="container">
        <img src="./img/banner-bottom.png" alt="Coffee Cup and Beans" />
      </div>
    </section>

    <footer class="main-footer">
      <div class="container">
        <div class="footer-content">
          <div class="footer-logo">
            <img src="./img/logo.svg" alt="Amaya Roasting Co. Logo" />
          </div>
          <form class="validate-form" action="#">
            <input
              type="email"
              class="email-input"
              placeholder="Enter email address..."
            />

            <input type="checkbox" id="error-checker" class="hidden-checker" />

            <label for="error-checker" class="fake-btn">Contact Us</label>

            <button type="submit" class="real-btn">Contact Us</button>

            <span class="error-msg">Vui lòng nhập email!</span>
          </form>
        </div>
      </div>
    </footer>
  </body>
</html>
